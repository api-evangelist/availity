specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Availity
providerId: availity
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
notes: Availity does not publish public per-second rate limit numbers on its public site. Limits are
  per trading-partner / per-application, governed by the trading-partner agreement. Trading-partner
  developer docs (apicraft.availity.com) require authenticated access.
tags:
  - Healthcare
  - HIPAA
  - X12 EDI
  - Rate Limiting
description: Rate limits for the Availity REST and X12 surfaces. Limits are per registered application
  / trading-partner, with separate ceilings for batch X12 vs real-time transactions. Numeric limits
  are not posted publicly; they are enforced via Availity's trading-partner agreement and gateway.
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: REST API per-application
    scope: application
    metric: varies
    limit: see trading-partner agreement
    notes: Availity gates real-time eligibility / claim-status REST APIs per registered application;
      numeric ceilings depend on the partner agreement.
  - name: X12 batch
    scope: trading-partner
    metric: varies
    limit: see trading-partner agreement
    notes: Batch X12 submissions are sized by file size and submission frequency rather than per-second
      RPS.
  - name: Real-time X12 (270/271, 276/277, 278)
    scope: trading-partner
    metric: varies
    limit: see trading-partner agreement
    notes: Real-time 270/276/278 transactions are intended for point-of-care lookups and shaped to
      sub-second latency; volume is bounded by partner contract.
policies:
  - name: Backoff Strategy
    description: Implement exponential backoff with jitter on 429 / 503. Honor Retry-After when present.
  - name: Trading Partner Agreement Governs
    description: Sustained throughput must be authorized in the Availity trading-partner agreement;
      uncoordinated bursts may be throttled even if within the technical ceiling.
  - name: HIPAA / PHI Handling
    description: All requests carry PHI; clients must operate under a BAA with Availity and adhere to
      HIPAA Security Rule controls in addition to rate posture.
  - name: Idempotency for Claims
    description: 837 claim submissions should use payer-assigned tracking identifiers (ICN / Claim ID)
      to prevent duplicate adjudication on retry.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
