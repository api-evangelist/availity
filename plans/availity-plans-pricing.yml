specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Availity
providerId: availity
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
notes: Availity does not publish public per-call API pricing. Provider portal access (Availity
  Essentials) is free to providers because participating health plans pay for it. Premium offerings
  (Essentials Pro, Clearinghouse, RCM, Extend) are quote-based and depend on transaction volume,
  payer mix, and integration scope.
tags:
  - Healthcare
  - HIPAA
  - X12 EDI
  - Eligibility
  - Claims
  - Clearinghouse
  - Revenue Cycle Management
description: Availity is a healthcare network connecting providers, health plans, and trading partners.
  Availity Essentials (provider portal) is free to providers — paid for by participating health plans.
  Premium offerings (Essentials Pro, Clearinghouse / Trading Partner Network, Revenue Cycle Management,
  Extend orchestration) are subscription / per-transaction priced and quote-based.
sources:
  - https://www.availity.com/
  - https://www.availity.com/essentials
  - https://www.availity.com/products
plans:
  - id: availity-essentials
    name: Availity Essentials
    type: freemium
    description: Free multi-payer provider portal. Providers access eligibility, claim status, ERA, and
      authorizations across participating payers. Cost is borne by the payers, not the provider.
    entries:
      - label: Provider Portal Access
        name: provider_portal
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: US
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Eligibility & Benefits (270/271)
      - name: Claim Status (276/277)
      - name: Electronic Remittance Advice (835)
      - name: Authorizations
      - name: Multi-Payer Reporting
  - id: availity-essentials-pro
    name: Availity Essentials Pro
    type: subscription
    description: Paid upgrade to Essentials with deeper RCM workflows, expanded reporting, and value-add
      tools for provider organizations. Quote-based pricing.
    entries:
      - label: Essentials Pro Subscription
        name: essentials_pro
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: US
        unit: 1
        price: contact sales
        userMultiplied: true
    elements:
      - name: Advanced Claim Status workflows
      - name: Coverage Discovery
      - name: Worklist Management
      - name: Enhanced Reporting
  - id: availity-clearinghouse
    name: Clearinghouse / Trading Partner Network
    type: usage-based
    description: National-scale X12 transaction processing for trading partners. Per-transaction or
      volume-tier pricing under bilateral agreement.
    entries:
      - label: X12 Transaction
        name: x12_transaction
        type: metered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: '270/271 Eligibility'
      - name: '276/277 Claim Status'
      - name: '278 Authorization'
      - name: '835 ERA'
      - name: '837 Claim Submission'
  - id: availity-rcm
    name: Revenue Cycle Management
    type: subscription
    description: Pre-service, post-service, and post-adjudication RCM tooling. Quote-based pricing.
    entries:
      - label: RCM Subscription
        name: rcm_subscription
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: US
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Pre-service eligibility & estimation
      - name: Claim editing & submission
      - name: Denial management
      - name: Post-adjudication reconciliation
  - id: availity-extend
    name: Availity Extend
    type: enterprise
    description: Orchestration layer for building automated healthcare workflows on top of the Availity
      network. Enterprise pricing.
    entries:
      - label: Extend Platform
        name: extend_platform
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: US
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Workflow orchestration
      - name: Real-time API integration
      - name: Event-driven automation
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
