naftiko: 1.0.0-alpha2
info:
  label: Availity Healthcare Revenue Cycle Management
  description: Unified workflow for revenue cycle management combining eligibility verification, claim status tracking, and
    prior authorization. Used by billing departments and revenue cycle teams to streamline patient encounter workflows.
  tags:
  - Availity
  - Revenue Cycle
  - Healthcare
  - Claims
  - Eligibility
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    AVAILITY_CLIENT_ID: AVAILITY_CLIENT_ID
    AVAILITY_CLIENT_SECRET: AVAILITY_CLIENT_SECRET
capability:
  consumes:
  - type: http
    namespace: availity-eligibility
    baseUri: https://api.availity.com
    description: Availity Eligibility & Benefits API
    authentication:
      type: bearer
      token: '{{AVAILITY_TOKEN}}'
    resources:
    - name: eligibilities
      path: /availity/intelligent-payer-network/v1/eligibilities
      description: Member eligibility inquiries
      operations:
      - name: check-eligibility
        method: POST
        description: Submit real-time eligibility and benefits inquiry
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: list-eligibilities
        method: GET
        description: List previous eligibility inquiries
        inputParameters:
        - name: fromDate
          in: query
          type: string
          required: false
          description: Start date filter
        - name: toDate
          in: query
          type: string
          required: false
          description: End date filter
        - name: limit
          in: query
          type: integer
          required: false
          description: Results per page
        - name: offset
          in: query
          type: integer
          required: false
          description: Pagination offset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-eligibility
        method: GET
        description: Get specific eligibility inquiry by ID
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: Eligibility transaction ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: payers
      path: /availity/intelligent-payer-network/v1/payers
      description: Supported health plan payers
      operations:
      - name: list-payers
        method: GET
        description: List supported payers
        inputParameters:
        - name: supportedTransaction
          in: query
          type: string
          required: false
          description: Filter by transaction type
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: availity-claims
    baseUri: https://api.availity.com
    description: Availity Claim Status API
    authentication:
      type: bearer
      token: '{{AVAILITY_TOKEN}}'
    resources:
    - name: claim-statuses
      path: /availity/intelligent-payer-network/v1/claim-statuses
      description: Claim status inquiries
      operations:
      - name: create-claim-status-inquiry
        method: POST
        description: Submit a claim status inquiry
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: list-claim-status-inquiries
        method: GET
        description: List previous claim status inquiries
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: enhanced-claim-status
      path: /clmsmgmt/claim-status/claim-status/v1/status
      description: Enhanced claim status with summary and detail search
      operations:
      - name: summary-search-claims
        method: POST
        description: High-level claim search by service date or member ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: detail-search-claim
        method: POST
        description: Detailed claim lookup by claim number
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: availity-auth
    baseUri: https://api.availity.com
    description: Availity Service Reviews and Prior Authorization API
    authentication:
      type: bearer
      token: '{{AVAILITY_TOKEN}}'
    resources:
    - name: service-reviews
      path: /availity/intelligent-payer-network/v1/service-reviews
      description: Prior authorization and service review requests
      operations:
      - name: create-service-review
        method: POST
        description: Submit a prior authorization request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: list-service-reviews
        method: GET
        description: List previous service review submissions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-service-review
        method: GET
        description: Get specific service review by ID
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: Service review ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: is-auth-required
      path: /value-adds/v1/isauthrequired
      description: Check if authorization is required before submission
      operations:
      - name: check-is-auth-required
        method: POST
        description: Query if payer requires prior authorization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: availity-rcm-api
    description: Unified REST API for healthcare revenue cycle management.
    resources:
    - path: /v1/eligibilities
      name: eligibilities
      description: Member eligibility verification
      operations:
      - method: POST
        name: verify-eligibility
        description: Verify member insurance coverage and benefits
        call: availity-eligibility.check-eligibility
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: list-eligibilities
        description: List eligibility inquiries
        call: availity-eligibility.list-eligibilities
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/payers
      name: payers
      description: Supported health plan payers
      operations:
      - method: GET
        name: list-payers
        description: List supported payers
        call: availity-eligibility.list-payers
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/claim-statuses
      name: claim-statuses
      description: Claim status inquiries
      operations:
      - method: POST
        name: check-claim-status
        description: Submit claim status inquiry
        call: availity-claims.create-claim-status-inquiry
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: list-claim-statuses
        description: List claim status inquiries
        call: availity-claims.list-claim-status-inquiries
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/prior-authorizations
      name: prior-authorizations
      description: Prior authorization requests
      operations:
      - method: POST
        name: check-auth-required
        description: Check if authorization is required
        call: availity-auth.check-is-auth-required
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: submit-authorization
        description: Submit prior authorization request
        call: availity-auth.create-service-review
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: availity-rcm-mcp
    transport: http
    description: MCP server for AI-assisted healthcare revenue cycle management.
    tools:
    - name: verify-member-eligibility
      description: Verify patient insurance eligibility and benefits before service delivery
      hints:
        readOnly: false
        openWorld: true
      call: availity-eligibility.check-eligibility
      outputParameters:
      - type: object
        mapping: $.
    - name: list-eligibility-history
      description: List previous eligibility inquiries for audit and follow-up
      hints:
        readOnly: true
        openWorld: true
      call: availity-eligibility.list-eligibilities
      outputParameters:
      - type: object
        mapping: $.
    - name: lookup-supported-payers
      description: Find health plan payers available for transactions
      hints:
        readOnly: true
        openWorld: true
      call: availity-eligibility.list-payers
      outputParameters:
      - type: object
        mapping: $.
    - name: submit-claim-status-inquiry
      description: Submit a claim status inquiry to check adjudication status
      hints:
        readOnly: false
        openWorld: true
      call: availity-claims.create-claim-status-inquiry
      outputParameters:
      - type: object
        mapping: $.
    - name: search-claims-summary
      description: Search claims by service date or member ID for revenue tracking
      hints:
        readOnly: true
        openWorld: true
      call: availity-claims.summary-search-claims
      outputParameters:
      - type: object
        mapping: $.
    - name: get-claim-detail
      description: Get detailed claim information including adjudication and payment amounts
      hints:
        readOnly: true
        openWorld: true
      call: availity-claims.detail-search-claim
      outputParameters:
      - type: object
        mapping: $.
    - name: check-prior-auth-required
      description: Determine if a payer requires prior authorization before service delivery
      hints:
        readOnly: true
        openWorld: true
      call: availity-auth.check-is-auth-required
      outputParameters:
      - type: object
        mapping: $.
    - name: submit-prior-authorization
      description: Submit a prior authorization request for a scheduled procedure
      hints:
        readOnly: false
        openWorld: true
      call: availity-auth.create-service-review
      outputParameters:
      - type: object
        mapping: $.
    - name: track-authorization-status
      description: Track the status of a submitted prior authorization request
      hints:
        readOnly: true
        openWorld: true
      call: availity-auth.get-service-review
      outputParameters:
      - type: object
        mapping: $.
