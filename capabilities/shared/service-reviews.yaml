naftiko: 1.0.0-alpha1
info:
  label: Availity Service Reviews API
  description: Prior authorization and service review request management using X12 278 transactions.
  tags:
  - Availity
  - Prior Authorization
  - Healthcare
  - EDI
  created: '2026-04-19'
  modified: '2026-04-19'
binds:
- namespace: env
  keys:
    AVAILITY_CLIENT_ID: AVAILITY_CLIENT_ID
    AVAILITY_CLIENT_SECRET: AVAILITY_CLIENT_SECRET
capability:
  consumes:
  - type: http
    namespace: availity-auth
    baseUri: https://api.availity.com
    description: Availity Service Reviews and Prior Authorization API
    authentication:
      type: bearer
      token: '{{AVAILITY_TOKEN}}'
    resources:
    - name: service-reviews
      path: /availity/intelligent-payer-network/v1/service-reviews
      description: Prior authorization and service review requests
      operations:
      - name: create-service-review
        method: POST
        description: Submit a prior authorization request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: list-service-reviews
        method: GET
        description: List previous service review submissions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-service-review
        method: GET
        description: Get specific service review by ID
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: Service review ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: is-auth-required
      path: /value-adds/v1/isauthrequired
      description: Check if authorization is required before submission
      operations:
      - name: check-is-auth-required
        method: POST
        description: Query if payer requires prior authorization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8102
    namespace: availity-auth-rest
    resources:
    - path: /v1/service-reviews
      name: service-reviews
      description: Prior authorization requests
      operations:
      - method: POST
        name: create-service-review
        description: Submit prior authorization
        call: availity-auth.create-service-review
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: list-service-reviews
        description: List service reviews
        call: availity-auth.list-service-reviews
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9102
    namespace: availity-auth-mcp
    transport: http
    tools:
    - name: check-auth-required
      description: Check if a payer requires prior authorization for a procedure
      hints:
        readOnly: true
        openWorld: true
      call: availity-auth.check-is-auth-required
      outputParameters:
      - type: object
        mapping: $.
    - name: submit-prior-authorization
      description: Submit a prior authorization request to a health plan payer
      hints:
        readOnly: false
        openWorld: true
      call: availity-auth.create-service-review
      outputParameters:
      - type: object
        mapping: $.
    - name: track-authorization-status
      description: Check the status of a submitted prior authorization request
      hints:
        readOnly: true
        openWorld: true
      call: availity-auth.get-service-review
      outputParameters:
      - type: object
        mapping: $.
