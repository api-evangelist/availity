naftiko: 1.0.0-alpha1
info:
  label: Availity Eligibility & Benefits API
  description: Real-time member eligibility and benefits verification using X12 270/271 transactions.
  tags:
  - Availity
  - Eligibility
  - Benefits
  - Healthcare
  - EDI
  created: '2026-04-19'
  modified: '2026-04-19'
binds:
- namespace: env
  keys:
    AVAILITY_CLIENT_ID: AVAILITY_CLIENT_ID
    AVAILITY_CLIENT_SECRET: AVAILITY_CLIENT_SECRET
capability:
  consumes:
  - type: http
    namespace: availity-eligibility
    baseUri: https://api.availity.com
    description: Availity Eligibility & Benefits API
    authentication:
      type: bearer
      token: '{{AVAILITY_TOKEN}}'
    resources:
    - name: eligibilities
      path: /availity/intelligent-payer-network/v1/eligibilities
      description: Member eligibility inquiries
      operations:
      - name: check-eligibility
        method: POST
        description: Submit real-time eligibility and benefits inquiry
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: list-eligibilities
        method: GET
        description: List previous eligibility inquiries
        inputParameters:
        - name: fromDate
          in: query
          type: string
          required: false
          description: Start date filter
        - name: toDate
          in: query
          type: string
          required: false
          description: End date filter
        - name: limit
          in: query
          type: integer
          required: false
          description: Results per page
        - name: offset
          in: query
          type: integer
          required: false
          description: Pagination offset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-eligibility
        method: GET
        description: Get specific eligibility inquiry by ID
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: Eligibility transaction ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: payers
      path: /availity/intelligent-payer-network/v1/payers
      description: Supported health plan payers
      operations:
      - name: list-payers
        method: GET
        description: List supported payers
        inputParameters:
        - name: supportedTransaction
          in: query
          type: string
          required: false
          description: Filter by transaction type
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8100
    namespace: availity-eligibility-rest
    resources:
    - path: /v1/eligibilities
      name: eligibilities
      description: Member eligibility verification
      operations:
      - method: POST
        name: check-eligibility
        description: Submit eligibility inquiry
        call: availity-eligibility.check-eligibility
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: list-eligibilities
        description: List eligibility inquiries
        call: availity-eligibility.list-eligibilities
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/payers
      name: payers
      description: Supported payers
      operations:
      - method: GET
        name: list-payers
        description: List supported payers
        call: availity-eligibility.list-payers
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9100
    namespace: availity-eligibility-mcp
    transport: http
    tools:
    - name: check-member-eligibility
      description: Submit a real-time eligibility and benefits inquiry for a member
      hints:
        readOnly: false
        openWorld: true
      call: availity-eligibility.check-eligibility
      outputParameters:
      - type: object
        mapping: $.
    - name: list-eligibility-inquiries
      description: List previous eligibility inquiry results
      hints:
        readOnly: true
        openWorld: true
      call: availity-eligibility.list-eligibilities
      outputParameters:
      - type: object
        mapping: $.
    - name: list-supported-payers
      description: List health plan payers supported for eligibility transactions
      hints:
        readOnly: true
        openWorld: true
      call: availity-eligibility.list-payers
      outputParameters:
      - type: object
        mapping: $.
