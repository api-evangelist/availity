naftiko: 1.0.0-alpha2
info:
  label: Availity Service Reviews (Prior Authorization) API — Is Auth Required
  description: 'Availity Service Reviews (Prior Authorization) API — Is Auth Required. 2 operations. Lead operation: Availity
    Check if Authorization is Required. Self-contained Naftiko capability covering one Availity business surface.'
  tags:
  - Availity
  - Is Auth Required
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AVAILITY_API_KEY: AVAILITY_API_KEY
capability:
  consumes:
  - type: http
    namespace: service-reviews-is-auth-required
    baseUri: https://api.availity.com
    description: Availity Service Reviews (Prior Authorization) API — Is Auth Required business capability. Self-contained,
      no shared references.
    resources:
    - name: value-adds-v1-isauthrequired
      path: /value-adds/v1/isauthrequired
      operations:
      - name: checkisauthrequired
        method: POST
        description: Availity Check if Authorization is Required
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: value-adds-v1-isauthrequired-id
      path: /value-adds/v1/isauthrequired/{id}
      operations:
      - name: getisauthrequiredresult
        method: GET
        description: Availity Get Authorization Requirement Result
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Job ID from POST response
          required: true
    authentication:
      type: bearer
      token: '{{env.AVAILITY_API_KEY}}'
  exposes:
  - type: rest
    namespace: service-reviews-is-auth-required-rest
    port: 8080
    description: REST adapter for Availity Service Reviews (Prior Authorization) API — Is Auth Required. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/value-adds/v1/isauthrequired
      name: value-adds-v1-isauthrequired
      description: REST surface for value-adds-v1-isauthrequired.
      operations:
      - method: POST
        name: checkisauthrequired
        description: Availity Check if Authorization is Required
        call: service-reviews-is-auth-required.checkisauthrequired
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/value-adds/v1/isauthrequired/{id}
      name: value-adds-v1-isauthrequired-id
      description: REST surface for value-adds-v1-isauthrequired-id.
      operations:
      - method: GET
        name: getisauthrequiredresult
        description: Availity Get Authorization Requirement Result
        call: service-reviews-is-auth-required.getisauthrequiredresult
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: service-reviews-is-auth-required-mcp
    port: 9090
    transport: http
    description: MCP adapter for Availity Service Reviews (Prior Authorization) API — Is Auth Required. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: availity-check-if-authorization-is
      description: Availity Check if Authorization is Required
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: service-reviews-is-auth-required.checkisauthrequired
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: availity-get-authorization-requirement-result
      description: Availity Get Authorization Requirement Result
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: service-reviews-is-auth-required.getisauthrequiredresult
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
