    resources:
    - name: availity-intelligent-payer-network-v1-claim-attachments
      path: /availity/intelligent-payer-network/v1/claim-attachments
      operations:
      - name: submitclaimattachment
        method: POST
        description: Availity Submit Claim Attachment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: availity-intelligent-payer-network-v1-claim-attachments-id
      path: /availity/intelligent-payer-network/v1/claim-attachments/{id}
