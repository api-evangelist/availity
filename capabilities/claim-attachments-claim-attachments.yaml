      description: REST surface for availity-intelligent-payer-network-v1-claim-attachments.
      operations:
      - method: POST
        name: submitclaimattachment
        description: Availity Submit Claim Attachment
        call: claim-attachments-claim-attachments.submitclaimattachment
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/availity/intelligent-payer-network/v1/claim-attachments/{id}
